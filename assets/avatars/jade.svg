<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-jade"><circle cx="100" cy="100" r="100"/></clipPath>
    <radialGradient id="bg-jade" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a3a30"/>
      <stop offset="100%" stop-color="#0a1a14"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-jade)"/>
  <circle cx="100" cy="100" r="97" fill="none" stroke="#50b890" stroke-width="1.5" opacity="0.35"/>

  <!-- Blazer over casual top / shoulders -->
  <path d="M 0 200 L 0 158 Q 32 146 60 154 L 72 168 L 100 162 L 128 168 L 140 154 Q 168 146 200 158 L 200 200 Z" fill="#1a2a24"/>
  <!-- Blazer lapels -->
  <path d="M 72 168 L 84 156 L 100 172 L 116 156 L 128 168 L 100 162 Z" fill="#243830"/>
  <!-- Casual inner top -->
  <path d="M 88 162 L 90 200 L 110 200 L 112 162 Z" fill="#e0d8c8" opacity="0.8"/>
  <!-- V-neck line -->
  <path d="M 90 160 L 100 172 L 110 160" stroke="#c8c0b0" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- Neck -->
  <rect x="89" y="143" width="22" height="22" rx="5" fill="#d8b498"/>
  <!-- Head -->
  <ellipse cx="100" cy="116" rx="35" ry="37" fill="#e0be9e"/>
  <!-- Ears -->
  <ellipse cx="65" cy="118" rx="6" ry="8" fill="#d0a880"/>
  <ellipse cx="135" cy="118" rx="6" ry="8" fill="#d0a880"/>
  <ellipse cx="66" cy="118" rx="3.5" ry="5.5" fill="#d8b090"/>
  <ellipse cx="134" cy="118" rx="3.5" ry="5.5" fill="#d8b090"/>

  <!-- Hair - shoulder-length, wavy, dark auburn -->
  <path d="M 65 108 Q 65 70 100 66 Q 135 70 135 108 Q 127 82 100 80 Q 73 82 65 108 Z" fill="#2a1410"/>
  <!-- Wavy hair falling to shoulders -->
  <path d="M 65 108 Q 60 130 58 155 Q 60 162 66 160 Q 64 140 68 120 L 68 108 Z" fill="#2a1410"/>
  <path d="M 135 108 Q 140 130 142 155 Q 140 162 134 160 Q 136 140 132 120 L 132 108 Z" fill="#2a1410"/>
  <!-- Wave texture left -->
  <path d="M 62 125 Q 58 135 60 145" stroke="#3a2018" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M 66 120 Q 62 132 64 142" stroke="#3a2018" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Wave texture right -->
  <path d="M 138 125 Q 142 135 140 145" stroke="#3a2018" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M 134 120 Q 138 132 136 142" stroke="#3a2018" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Side hair -->
  <path d="M 65 108 Q 68 94 74 88 L 68 105 Z" fill="#2a1410"/>
  <path d="M 135 108 Q 132 94 126 88 L 132 105 Z" fill="#2a1410"/>

  <!-- Eyebrows - thoughtful arch -->
  <path d="M 80 104 Q 87 101 94 103" stroke="#2a1410" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 106 103 Q 113 101 120 104" stroke="#2a1410" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes - observant, hazel -->
  <ellipse cx="88" cy="114" rx="6" ry="6.5" fill="#fff"/>
  <ellipse cx="112" cy="114" rx="6" ry="6.5" fill="#fff"/>
  <circle cx="89" cy="114" r="4" fill="#5a7040"/>
  <circle cx="113" cy="114" r="4" fill="#5a7040"/>
  <circle cx="90" cy="112" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="114" cy="112" r="1.5" fill="rgba(255,255,255,0.7)"/>

  <!-- Nose -->
  <path d="M 100 120 Q 97 128 95 130 Q 100 133 105 130 Q 103 128 100 120" fill="#c09068" opacity="0.8"/>

  <!-- Mouth - thoughtful slight smile -->
  <path d="M 91 140 Q 100 145 109 140" stroke="#8a4525" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 93 140 Q 100 142 107 140" stroke="#d09080" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
