<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-pixel"><circle cx="100" cy="100" r="100"/></clipPath>
    <radialGradient id="bg-pixel" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0a3040"/>
      <stop offset="100%" stop-color="#051820"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-pixel)"/>
  <circle cx="100" cy="100" r="97" fill="none" stroke="#20d0d0" stroke-width="1.5" opacity="0.35"/>

  <!-- Hoodie / shoulders -->
  <path d="M 0 200 L 0 158 Q 32 146 58 154 L 70 168 L 100 162 L 130 168 L 142 154 Q 168 146 200 158 L 200 200 Z" fill="#1a3848"/>
  <!-- Hoodie hood outline -->
  <path d="M 58 154 Q 55 148 58 142 Q 70 134 80 140 L 72 150 Z" fill="#1e4050"/>
  <path d="M 142 154 Q 145 148 142 142 Q 130 134 120 140 L 128 150 Z" fill="#1e4050"/>
  <!-- Hoodie strings -->
  <line x1="88" y1="162" x2="85" y2="185" stroke="#40a0a0" stroke-width="1.5" opacity="0.6"/>
  <line x1="112" y1="162" x2="115" y2="185" stroke="#40a0a0" stroke-width="1.5" opacity="0.6"/>
  <!-- Hoodie front -->
  <path d="M 86 162 L 90 200 L 110 200 L 114 162 Z" fill="#163038"/>

  <!-- Neck -->
  <rect x="89" y="143" width="22" height="20" rx="5" fill="#f0d0b8"/>
  <!-- Head -->
  <ellipse cx="100" cy="116" rx="35" ry="37" fill="#f2d8c2"/>
  <!-- Ears -->
  <ellipse cx="65" cy="118" rx="6" ry="8" fill="#e8c4a8"/>
  <ellipse cx="135" cy="118" rx="6" ry="8" fill="#e8c4a8"/>
  <ellipse cx="66" cy="118" rx="3.5" ry="5.5" fill="#f0ccb0"/>
  <ellipse cx="134" cy="118" rx="3.5" ry="5.5" fill="#f0ccb0"/>

  <!-- Hair - messy, creative, teal-tipped -->
  <path d="M 63 110 Q 62 68 100 62 Q 138 68 137 110 Q 128 80 100 77 Q 72 80 63 110 Z" fill="#2a1a14"/>
  <!-- Messy spikes -->
  <path d="M 72 84 L 68 72 Q 75 76 80 74 L 76 86 Z" fill="#2a1a14"/>
  <path d="M 94 78 L 90 64 Q 96 68 102 64 L 106 78 Z" fill="#2a1a14"/>
  <path d="M 120 82 L 126 70 Q 130 76 134 74 L 128 88 Z" fill="#2a1a14"/>
  <!-- Teal tips -->
  <path d="M 68 72 Q 72 68 75 74" stroke="#20d0d0" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 90 64 Q 96 60 102 64" stroke="#20d0d0" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 126 70 Q 130 66 134 74" stroke="#20d0d0" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Side hair -->
  <path d="M 63 110 Q 66 94 72 88 L 70 104 Z" fill="#2a1a14"/>
  <path d="M 137 110 Q 134 94 128 88 L 130 104 Z" fill="#2a1a14"/>

  <!-- Eyebrows -->
  <path d="M 80 105 Q 87 102 94 104" stroke="#2a1a14" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 106 104 Q 113 102 120 105" stroke="#2a1a14" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes - bright -->
  <ellipse cx="88" cy="114" rx="6" ry="6.5" fill="#fff"/>
  <ellipse cx="112" cy="114" rx="6" ry="6.5" fill="#fff"/>
  <circle cx="89" cy="114" r="4" fill="#2080a0"/>
  <circle cx="113" cy="114" r="4" fill="#2080a0"/>
  <circle cx="90" cy="112" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="114" cy="112" r="1.5" fill="rgba(255,255,255,0.7)"/>

  <!-- Nose -->
  <path d="M 100 120 Q 97 128 95 130 Q 100 133 105 130 Q 103 128 100 120" fill="#d4a888" opacity="0.8"/>

  <!-- Mouth - grin -->
  <path d="M 89 139 Q 100 148 111 139" stroke="#a05038" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 91 139 Q 100 143 109 139" stroke="#e8a090" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
