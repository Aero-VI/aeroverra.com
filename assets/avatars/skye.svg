<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-skye"><circle cx="100" cy="100" r="100"/></clipPath>
    <radialGradient id="bg-skye" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#e8825a"/>
      <stop offset="100%" stop-color="#c05a28"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-skye)"/>
  <!-- Warm accent ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#f0c870" stroke-width="2" opacity="0.5"/>

  <!-- Turtleneck / shoulders -->
  <path d="M 0 200 L 0 160 Q 32 146 60 154 L 72 168 L 100 162 L 128 168 L 140 154 Q 168 146 200 160 L 200 200 Z" fill="#2a1a18"/>
  <!-- Turtleneck collar -->
  <path d="M 82 150 Q 82 158 82 164 L 100 162 L 118 164 Q 118 158 118 150" fill="#2a1a18"/>
  <rect x="82" y="148" width="36" height="16" rx="4" fill="#352220"/>

  <!-- Neck -->
  <rect x="89" y="143" width="22" height="20" rx="5" fill="#f0d0b8"/>
  <!-- Head -->
  <ellipse cx="100" cy="116" rx="35" ry="37" fill="#f2d6c0"/>
  <!-- Ears -->
  <ellipse cx="65" cy="118" rx="6" ry="8" fill="#e8c0a5"/>
  <ellipse cx="135" cy="118" rx="6" ry="8" fill="#e8c0a5"/>
  <ellipse cx="66" cy="118" rx="3.5" ry="5.5" fill="#f0ccb2"/>
  <ellipse cx="134" cy="118" rx="3.5" ry="5.5" fill="#f0ccb2"/>
  <!-- Small earring accents -->
  <circle cx="65" cy="124" r="2" fill="#f0c870"/>
  <circle cx="135" cy="124" r="2" fill="#f0c870"/>

  <!-- Hair - short styled, swept to side, warm brown -->
  <path d="M 65 108 Q 65 70 100 65 Q 135 70 135 108 Q 127 82 100 80 Q 73 82 65 108 Z" fill="#5a2a18"/>
  <!-- Styled sweep -->
  <path d="M 70 90 Q 80 72 100 68 Q 110 70 115 76 L 108 88 Q 95 78 78 85 Z" fill="#6e3420"/>
  <!-- Side fringe -->
  <path d="M 65 108 Q 68 92 78 85 L 72 100 Z" fill="#5a2a18"/>
  <path d="M 135 108 Q 130 96 125 92 L 128 104 Z" fill="#5a2a18"/>

  <!-- Eyebrows - arched, expressive -->
  <path d="M 80 104 Q 87 100 94 103" stroke="#4a2010" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 106 103 Q 113 100 120 104" stroke="#4a2010" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="88" cy="114" rx="6" ry="6.5" fill="#fff"/>
  <ellipse cx="112" cy="114" rx="6" ry="6.5" fill="#fff"/>
  <circle cx="89" cy="114" r="4" fill="#2a6040"/>
  <circle cx="113" cy="114" r="4" fill="#2a6040"/>
  <circle cx="90" cy="112" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="114" cy="112" r="1.5" fill="rgba(255,255,255,0.7)"/>

  <!-- Nose -->
  <path d="M 100 120 Q 97 128 95 130 Q 100 133 105 130 Q 103 128 100 120" fill="#d4a888" opacity="0.8"/>

  <!-- Mouth - warm smile -->
  <path d="M 89 139 Q 100 146 111 139" stroke="#a05038" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 92 139 Q 100 142 108 139" stroke="#e8a090" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
