<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-kai" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#081e1a"/>
      <stop offset="100%" stop-color="#030e0c"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-kai)"/>
  <!-- Circuit board grid lines (very subtle) -->
  <line x1="20" y1="0" x2="20" y2="200" stroke="#00d4aa" stroke-width="0.4" opacity="0.1"/>
  <line x1="60" y1="0" x2="60" y2="200" stroke="#00d4aa" stroke-width="0.4" opacity="0.1"/>
  <line x1="140" y1="0" x2="140" y2="200" stroke="#00d4aa" stroke-width="0.4" opacity="0.1"/>
  <line x1="180" y1="0" x2="180" y2="200" stroke="#00d4aa" stroke-width="0.4" opacity="0.1"/>
  <line x1="0" y1="40" x2="200" y2="40" stroke="#00d4aa" stroke-width="0.4" opacity="0.1"/>
  <line x1="0" y1="160" x2="200" y2="160" stroke="#00d4aa" stroke-width="0.4" opacity="0.1"/>
  <!-- Circuit nodes -->
  <circle cx="20" cy="40" r="2" fill="#00d4aa" opacity="0.25"/>
  <circle cx="180" cy="40" r="2" fill="#00d4aa" opacity="0.25"/>
  <circle cx="20" cy="160" r="2" fill="#00d4aa" opacity="0.25"/>
  <circle cx="180" cy="160" r="2" fill="#00d4aa" opacity="0.25"/>

  <!-- Hoodie / casual tech style -->
  <path d="M 0 200 L 0 150 Q 30 135 58 148 L 72 168 L 100 162 L 128 168 L 142 148 Q 170 135 200 150 L 200 200 Z" fill="#0a1a18"/>
  <!-- Hood edge -->
  <path d="M 58 148 Q 68 136 80 142 L 100 148 L 120 142 Q 132 136 142 148" stroke="#00a888" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- T-shirt under -->
  <path d="M 80 162 L 88 148 L 100 155 L 112 148 L 120 162 L 100 158 Z" fill="#0d2220"/>

  <!-- Neck -->
  <rect x="90" y="143" width="20" height="22" rx="4" fill="#d4a870"/>
  <!-- Head -->
  <ellipse cx="100" cy="114" rx="34" ry="37" fill="#d4a870"/>
  <!-- Ears -->
  <ellipse cx="66" cy="116" rx="6.5" ry="9" fill="#c89860"/>
  <ellipse cx="134" cy="116" rx="6.5" ry="9" fill="#c89860"/>
  <ellipse cx="66" cy="116" rx="4" ry="6" fill="#d4a870"/>
  <ellipse cx="134" cy="116" rx="4" ry="6" fill="#d4a870"/>

  <!-- Hair - short, neat, dark black -->
  <path d="M 66 105 Q 66 66 100 62 Q 134 66 134 105 Q 126 78 100 76 Q 74 78 66 105 Z" fill="#0a0806"/>
  <!-- Hair short cut lines -->
  <path d="M 66 105 Q 68 94 72 92" stroke="#0a0806" stroke-width="2" fill="none"/>
  <path d="M 134 105 Q 132 94 128 92" stroke="#0a0806" stroke-width="2" fill="none"/>

  <!-- Eyebrows - straight, focused -->
  <path d="M 80 103 L 95 103" stroke="#0a0806" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 105 103 L 120 103" stroke="#0a0806" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes - sharp, focused. Slightly narrowed. Deep dark with teal hint -->
  <ellipse cx="88" cy="113" rx="7" ry="6" fill="#fff"/>
  <ellipse cx="112" cy="113" rx="7" ry="6" fill="#fff"/>
  <circle cx="88" cy="113" r="5" fill="#1a6060"/>
  <circle cx="112" cy="113" r="5" fill="#1a6060"/>
  <circle cx="88" cy="113" r="3.5" fill="#050e0c"/>
  <circle cx="112" cy="113" r="3.5" fill="#050e0c"/>
  <circle cx="89.5" cy="111.5" r="1.5" fill="rgba(255,255,255,0.9)"/>
  <circle cx="113.5" cy="111.5" r="1.5" fill="rgba(255,255,255,0.9)"/>

  <!-- Nose -->
  <path d="M 100 118 Q 97 126 95 128 Q 100 131 105 128 Q 103 126 100 118" fill="#a07848" opacity="0.7"/>

  <!-- Mouth - slight focused line -->
  <path d="M 91 138 Q 100 143 109 138" stroke="#6a3820" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Teal glow ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
  <!-- Code brackets accent top-right -->
  <text x="158" y="36" font-size="24" fill="#00d4aa" opacity="0.4" font-family="monospace">&lt;/&gt;</text>
</svg>
