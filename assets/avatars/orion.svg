<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-orion" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#111830"/>
      <stop offset="100%" stop-color="#050818"/>
    </radialGradient>
    <radialGradient id="nebula-orion" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3050a8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a2060" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-orion)"/>
  <!-- Nebula glow -->
  <circle cx="100" cy="100" r="100" fill="url(#nebula-orion)"/>
  <!-- Stars scattered -->
  <circle cx="20" cy="25" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="45" cy="15" r="1" fill="white" opacity="0.6"/>
  <circle cx="170" cy="20" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="155" cy="40" r="1" fill="white" opacity="0.5"/>
  <circle cx="25" cy="60" r="1" fill="white" opacity="0.7"/>
  <circle cx="180" cy="55" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="15" cy="140" r="1" fill="white" opacity="0.5"/>
  <circle cx="185" cy="130" r="1.5" fill="white" opacity="0.7"/>

  <!-- Orion's Belt constellation (top) -->
  <circle cx="85" cy="22" r="2.5" fill="#7ba8e0" opacity="0.9"/>
  <circle cx="100" cy="20" r="2.5" fill="#7ba8e0" opacity="0.9"/>
  <circle cx="115" cy="22" r="2.5" fill="#7ba8e0" opacity="0.9"/>
  <line x1="85" y1="22" x2="100" y2="20" stroke="#5080c0" stroke-width="0.8" opacity="0.5"/>
  <line x1="100" y1="20" x2="115" y2="22" stroke="#5080c0" stroke-width="0.8" opacity="0.5"/>

  <!-- Suit/collar -->
  <path d="M 0 200 L 0 158 Q 35 145 60 153 L 74 170 L 100 163 L 126 170 L 140 153 Q 165 145 200 158 L 200 200 Z" fill="#0e1628"/>
  <!-- Silver trim on suit -->
  <path d="M 74 170 L 82 158 L 100 166 L 118 158 L 126 170 L 100 163 Z" fill="#162040"/>
  <path d="M 82 158 L 100 168 L 118 158" stroke="#8095c0" stroke-width="1.2" fill="none" opacity="0.7"/>

  <!-- Neck -->
  <rect x="90" y="143" width="20" height="22" rx="4" fill="#c8b898"/>
  <!-- Head -->
  <ellipse cx="100" cy="114" rx="35" ry="38" fill="#d4c4a8"/>
  <!-- Ears -->
  <ellipse cx="65" cy="116" rx="7" ry="9" fill="#c4b494"/>
  <ellipse cx="135" cy="116" rx="7" ry="9" fill="#c4b494"/>
  <ellipse cx="65" cy="116" rx="4" ry="6" fill="#ccc0a0"/>
  <ellipse cx="135" cy="116" rx="4" ry="6" fill="#ccc0a0"/>

  <!-- Hair - medium, silver-streaked dark -->
  <path d="M 65 104 Q 65 68 100 64 Q 135 68 135 104 Q 127 78 100 76 Q 73 78 65 104 Z" fill="#252a38"/>
  <!-- Silver streak in hair -->
  <path d="M 100 64 Q 106 70 108 80" stroke="#a0b0d0" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Side hair strands -->
  <path d="M 65 104 Q 68 90 72 88" stroke="#252a38" stroke-width="3" fill="none"/>
  <path d="M 135 104 Q 132 90 128 88" stroke="#252a38" stroke-width="3" fill="none"/>

  <!-- Eyebrows - calm, thoughtful -->
  <path d="M 80 103 Q 88 100 95 102" stroke="#252a38" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 105 102 Q 112 100 120 103" stroke="#252a38" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes - cool silver-blue -->
  <ellipse cx="88" cy="112" rx="6.5" ry="6.5" fill="#fff"/>
  <ellipse cx="112" cy="112" rx="6.5" ry="6.5" fill="#fff"/>
  <circle cx="88" cy="112" r="5" fill="#4870b0"/>
  <circle cx="112" cy="112" r="5" fill="#4870b0"/>
  <circle cx="88" cy="112" r="3" fill="#1a2840"/>
  <circle cx="112" cy="112" r="3" fill="#1a2840"/>
  <circle cx="89.5" cy="110.5" r="1.5" fill="rgba(255,255,255,0.9)"/>
  <circle cx="113.5" cy="110.5" r="1.5" fill="rgba(255,255,255,0.9)"/>

  <!-- Nose -->
  <path d="M 100 117 Q 97 126 95 128 Q 100 131 105 128 Q 103 126 100 117" fill="#b0a080" opacity="0.7"/>

  <!-- Mouth - composed, slight smile -->
  <path d="M 91 138 Q 100 144 109 138" stroke="#807060" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Constellation dots on cheeks (subtle) -->
  <circle cx="76" cy="124" r="1.5" fill="#7ba8e0" opacity="0.6"/>
  <circle cx="124" cy="124" r="1.5" fill="#7ba8e0" opacity="0.6"/>
  <circle cx="80" cy="132" r="1" fill="#7ba8e0" opacity="0.5"/>
  <circle cx="120" cy="132" r="1" fill="#7ba8e0" opacity="0.5"/>

  <!-- Outer ring glow -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#3050a8" stroke-width="1.5" opacity="0.4"/>
</svg>
