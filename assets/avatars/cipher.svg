<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-cipher" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#04080a"/>
      <stop offset="100%" stop-color="#010305"/>
    </radialGradient>
    <filter id="glow-cipher">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-cipher)"/>
  <!-- Cascading binary / code dots -->
  <text x="14" y="25" font-size="7" fill="#00ff41" opacity="0.15" font-family="monospace">10110</text>
  <text x="14" y="35" font-size="7" fill="#00ff41" opacity="0.12" font-family="monospace">01001</text>
  <text x="14" y="45" font-size="7" fill="#00ff41" opacity="0.08" font-family="monospace">11010</text>
  <text x="154" y="25" font-size="7" fill="#00ff41" opacity="0.15" font-family="monospace">01101</text>
  <text x="154" y="35" font-size="7" fill="#00ff41" opacity="0.12" font-family="monospace">10010</text>
  <text x="154" y="45" font-size="7" fill="#00ff41" opacity="0.08" font-family="monospace">00111</text>
  <!-- Lock icon top -->
  <rect x="88" y="10" width="24" height="18" rx="3" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>
  <path d="M 93 10 Q 93 4 100 4 Q 107 4 107 10" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="19" r="3" fill="#00ff41" opacity="0.4"/>
  <line x1="100" y1="19" x2="100" y2="24" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>

  <!-- Dark tactical wear -->
  <path d="M 0 200 L 0 145 Q 28 128 55 142 L 72 165 L 100 158 L 128 165 L 145 142 Q 172 128 200 145 L 200 200 Z" fill="#030608"/>
  <!-- Tactical collar / high neck -->
  <path d="M 72 165 Q 80 148 90 152 L 100 155 L 110 152 Q 120 148 128 165 L 100 158 Z" fill="#060c10"/>
  <path d="M 80 150 Q 90 154 100 156 Q 110 154 120 150" stroke="#00ff41" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- ID badge silhouette -->
  <rect x="66" y="152" width="14" height="18" rx="2" fill="#06100e" stroke="#00ff41" stroke-width="1" opacity="0.5"/>
  <line x1="69" y1="158" x2="77" y2="158" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
  <line x1="69" y1="162" x2="77" y2="162" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
  <circle cx="73" cy="155" r="2" fill="#00ff41" opacity="0.4"/>

  <!-- Neck - pale/cool skin -->
  <rect x="90" y="143" width="20" height="20" rx="3" fill="#d0ccc8"/>
  <!-- Head -->
  <ellipse cx="100" cy="114" rx="34" ry="36" fill="#d8d4d0"/>
  <!-- Ears - partially visible -->
  <ellipse cx="66" cy="116" rx="6" ry="8" fill="#c8c4c0"/>
  <ellipse cx="134" cy="116" rx="6" ry="8" fill="#c8c4c0"/>

  <!-- Hood pulled slightly back, dark -->
  <path d="M 66 105 Q 66 64 100 60 Q 134 64 134 105 Q 126 76 100 74 Q 74 76 66 105 Z" fill="#060c10"/>
  <!-- Hood edge visible -->
  <path d="M 66 105 Q 70 90 78 85" stroke="#0a1418" stroke-width="4" fill="none"/>
  <path d="M 134 105 Q 130 90 122 85" stroke="#0a1418" stroke-width="4" fill="none"/>
  <!-- Hair underneath - short dark -->
  <path d="M 70 104 Q 72 82 100 78 Q 128 82 130 104" fill="#0e1218" opacity="0.8"/>

  <!-- Eyebrows - low, serious -->
  <path d="M 80 104 Q 88 101 96 104" stroke="#0e1218" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 104 104 Q 112 101 120 104" stroke="#0e1218" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes - intense, dark with green tint -->
  <ellipse cx="88" cy="113" rx="7" ry="6.5" fill="#050a08"/>
  <ellipse cx="112" cy="113" rx="7" ry="6.5" fill="#050a08"/>
  <!-- Eye whites -->
  <ellipse cx="88" cy="113" rx="5.5" ry="5" fill="#ddd8d0"/>
  <ellipse cx="112" cy="113" rx="5.5" ry="5" fill="#ddd8d0"/>
  <circle cx="88" cy="113" r="4" fill="#004520"/>
  <circle cx="112" cy="113" r="4" fill="#004520"/>
  <circle cx="88" cy="113" r="2.5" fill="#010805"/>
  <circle cx="112" cy="113" r="2.5" fill="#010805"/>
  <!-- Green eye glow -->
  <circle cx="89.5" cy="111.5" r="1.2" fill="#00ff41" opacity="0.7" filter="url(#glow-cipher)"/>
  <circle cx="113.5" cy="111.5" r="1.2" fill="#00ff41" opacity="0.7" filter="url(#glow-cipher)"/>

  <!-- Nose -->
  <path d="M 100 118 Q 97 126 95 128 Q 100 131 105 128 Q 103 126 100 118" fill="#a8a8a0" opacity="0.6"/>

  <!-- Mouth - thin, set line -->
  <path d="M 91 139 L 109 139" stroke="#6a6a62" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Green scan line effect on face -->
  <line x1="66" y1="113" x2="134" y2="113" stroke="#00ff41" stroke-width="0.8" opacity="0.15"/>

  <!-- Matrix green glow ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.35" filter="url(#glow-cipher)"/>
</svg>
