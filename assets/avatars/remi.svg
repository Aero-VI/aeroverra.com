<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-remi"><circle cx="100" cy="100" r="100"/></clipPath>
    <radialGradient id="bg-remi" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3a1420"/>
      <stop offset="100%" stop-color="#1a0810"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-remi)"/>
  <circle cx="100" cy="100" r="97" fill="none" stroke="#a03040" stroke-width="1.5" opacity="0.35"/>

  <!-- Polo / shoulders -->
  <path d="M 0 200 L 0 158 Q 32 146 60 154 L 72 168 L 100 162 L 128 168 L 140 154 Q 168 146 200 158 L 200 200 Z" fill="#2a1418"/>
  <!-- Polo collar -->
  <path d="M 82 156 L 90 150 L 100 158 L 110 150 L 118 156 L 100 162 Z" fill="#381820"/>
  <!-- Collar points -->
  <path d="M 82 156 Q 86 150 90 150" stroke="#4a2028" stroke-width="1.5" fill="none"/>
  <path d="M 118 156 Q 114 150 110 150" stroke="#4a2028" stroke-width="1.5" fill="none"/>
  <!-- Polo front -->
  <path d="M 88 162 L 92 200 L 108 200 L 112 162 Z" fill="#241018"/>
  <!-- Polo buttons -->
  <circle cx="100" cy="168" r="1.5" fill="#605050" opacity="0.6"/>
  <circle cx="100" cy="176" r="1.5" fill="#605050" opacity="0.6"/>

  <!-- Neck -->
  <rect x="89" y="143" width="22" height="22" rx="5" fill="#b08060"/>
  <!-- Head -->
  <ellipse cx="100" cy="116" rx="35" ry="37" fill="#c09068"/>
  <!-- Ears -->
  <ellipse cx="65" cy="118" rx="6" ry="8" fill="#a87850"/>
  <ellipse cx="135" cy="118" rx="6" ry="8" fill="#a87850"/>
  <ellipse cx="66" cy="118" rx="3.5" ry="5.5" fill="#b08060"/>
  <ellipse cx="134" cy="118" rx="3.5" ry="5.5" fill="#b08060"/>

  <!-- Hair - curly, dark -->
  <path d="M 63 110 Q 62 68 100 63 Q 138 68 137 110 Q 128 80 100 78 Q 72 80 63 110 Z" fill="#0a0806"/>
  <!-- Curly texture -->
  <circle cx="75" cy="78" r="6" fill="#0a0806"/>
  <circle cx="88" cy="72" r="7" fill="#0a0806"/>
  <circle cx="100" cy="68" r="7" fill="#0a0806"/>
  <circle cx="112" cy="72" r="7" fill="#0a0806"/>
  <circle cx="125" cy="78" r="6" fill="#0a0806"/>
  <circle cx="70" cy="88" r="5" fill="#0a0806"/>
  <circle cx="130" cy="88" r="5" fill="#0a0806"/>
  <!-- Curl highlights -->
  <circle cx="88" cy="70" r="3" fill="#141210" opacity="0.6"/>
  <circle cx="112" cy="70" r="3" fill="#141210" opacity="0.6"/>
  <!-- Side hair -->
  <path d="M 63 110 Q 66 96 70 90 L 68 106 Z" fill="#0a0806"/>
  <path d="M 137 110 Q 134 96 130 90 L 132 106 Z" fill="#0a0806"/>

  <!-- Eyebrows - focused -->
  <path d="M 80 104 Q 87 101 94 103" stroke="#0a0806" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 106 103 Q 113 101 120 104" stroke="#0a0806" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="88" cy="114" rx="6" ry="6.5" fill="#fff"/>
  <ellipse cx="112" cy="114" rx="6" ry="6.5" fill="#fff"/>
  <circle cx="89" cy="114" r="4" fill="#2a1800"/>
  <circle cx="113" cy="114" r="4" fill="#2a1800"/>
  <circle cx="90" cy="112" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="114" cy="112" r="1.5" fill="rgba(255,255,255,0.7)"/>

  <!-- Nose -->
  <path d="M 100 120 Q 97 128 95 130 Q 100 133 105 130 Q 103 128 100 120" fill="#986848" opacity="0.8"/>

  <!-- Mouth - focused expression -->
  <path d="M 91 140 Q 100 144 109 140" stroke="#6a3020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 93 140 Q 100 142 107 140" stroke="#b07060" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
