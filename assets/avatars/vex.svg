  <path d="M 80 162 L 86 150 L 94 155 L 100 152 L 106 155 L 114 150 L 120 162 L 100 158 Z" fill="#18243a"/>
  <!-- Button line -->
  <circle cx="100" cy="162" r="2" fill="#2a3a5a"/>
  <circle cx="100" cy="172" r="2" fill="#2a3a5a"/>
  <circle cx="100" cy="182" r="2" fill="#2a3a5a"/>
  <!-- Blue accent on shoulder seams -->
  <path d="M 56 148 Q 60 152 64 162" stroke="#4a90d9" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 144 148 Q 140 152 136 162" stroke="#4a90d9" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Neck -->
  <rect x="90" y="143" width="20" height="20" rx="4" fill="#d4b090"/>
  <!-- Head -->
  <ellipse cx="100" cy="114" rx="34" ry="37" fill="#dbbf9a"/>
  <!-- Ears -->
  <ellipse cx="66" cy="116" rx="6.5" ry="9" fill="#ccae88"/>
  <ellipse cx="134" cy="116" rx="6.5" ry="9" fill="#ccae88"/>
  <ellipse cx="66" cy="116" rx="4" ry="6" fill="#dbbf9a"/>
  <ellipse cx="134" cy="116" rx="4" ry="6" fill="#dbbf9a"/>

  <!-- Hair - short-medium, neat, professional brown -->
  <path d="M 66 105 Q 66 66 100 62 Q 134 66 134 105 Q 126 78 100 76 Q 74 78 66 105 Z" fill="#3a2410"/>
  <!-- Clean side part -->
  <path d="M 88 64 Q 90 70 88 80" stroke="#4a3018" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Clean side definition -->
  <path d="M 66 105 Q 68 94 72 92" stroke="#3a2410" stroke-width="2" fill="none"/>
  <path d="M 134 105 Q 132 94 128 92" stroke="#3a2410" stroke-width="2" fill="none"/>

  <!-- Eyebrows - clean, professional -->
  <path d="M 80 103 Q 88 100 96 102" stroke="#3a2410" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 104 102 Q 112 100 120 103" stroke="#3a2410" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes - clear, competent, blue-gray -->
  <ellipse cx="88" cy="112" rx="6.5" ry="6.5" fill="#fff"/>
  <ellipse cx="112" cy="112" rx="6.5" ry="6.5" fill="#fff"/>
  <circle cx="88" cy="112" r="5" fill="#3a6090"/>
  <circle cx="112" cy="112" r="5" fill="#3a6090"/>
  <circle cx="88" cy="112" r="3.2" fill="#101828"/>
  <circle cx="112" cy="112" r="3.2" fill="#101828"/>
  <circle cx="89.5" cy="110.5" r="1.4" fill="rgba(255,255,255,0.9)"/>
  <circle cx="113.5" cy="110.5" r="1.4" fill="rgba(255,255,255,0.9)"/>

  <!-- Nose -->
  <path d="M 100 117 Q 97 126 95 128 Q 100 131 105 128 Q 103 126 100 117" fill="#a88458" opacity="0.7"/>

  <!-- Mouth - calm, measured smile -->
  <path d="M 91 137 Q 100 143 109 137" stroke="#7a4825" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 93 135 Q 100 137 107 135" stroke="#d09070" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Blue delivery accent glow ring -->
