<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-vex" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#101828"/>
      <stop offset="100%" stop-color="#050a14"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-vex)"/>
  <!-- Task/delivery lines (Kanban grid feel) -->
  <rect x="14" y="20" width="28" height="10" rx="2" fill="#4a90d9" opacity="0.12"/>
  <rect x="14" y="34" width="22" height="10" rx="2" fill="#4a90d9" opacity="0.09"/>
  <rect x="14" y="48" width="26" height="10" rx="2" fill="#4a90d9" opacity="0.07"/>
  <!-- Check marks -->
  <path d="M 162 24 L 166 28 L 174 20" stroke="#4a90d9" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M 162 38 L 166 42 L 174 34" stroke="#4a90d9" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <rect x="158" y="18" width="20" height="14" rx="2" fill="none" stroke="#4a90d9" stroke-width="1" opacity="0.2"/>
  <rect x="158" y="32" width="20" height="14" rx="2" fill="none" stroke="#4a90d9" stroke-width="1" opacity="0.2"/>

