<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-lyra" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#280d25"/>
      <stop offset="100%" stop-color="#0f0510"/>
    </radialGradient>
    <linearGradient id="hair-lyra" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a0830"/>
      <stop offset="100%" stop-color="#602040"/>
    </linearGradient>
    <linearGradient id="top-lyra" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#ff9e7a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-lyra)"/>
  <!-- Artistic paint splash elements -->
  <circle cx="30" cy="30" r="18" fill="#ff6b9d" opacity="0.12"/>
  <circle cx="170" cy="35" r="14" fill="#ff9e7a" opacity="0.1"/>
  <circle cx="20" cy="150" r="22" fill="#c040a0" opacity="0.1"/>
  <circle cx="175" cy="160" r="16" fill="#ff6b9d" opacity="0.1"/>
  <!-- Small color dots like paint palette -->
  <circle cx="168" cy="22" r="5" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="178" cy="30" r="4" fill="#ff9e7a" opacity="0.7"/>
  <circle cx="172" cy="38" r="3.5" fill="#c8a0ff" opacity="0.7"/>

  <!-- Outfit/shoulders - creative top -->
  <path d="M 0 200 L 0 152 Q 28 138 56 148 L 72 170 L 100 162 L 128 170 L 144 148 Q 172 138 200 152 L 200 200 Z" fill="#1e081a"/>
  <!-- Flowing scarf/collar -->
  <path d="M 70 168 Q 80 155 90 160 L 100 163 L 110 160 Q 120 155 130 168" fill="#2a0820" stroke="#c040a0" stroke-width="1" opacity="0.8"/>
  <!-- Color accent strip on clothing -->
  <path d="M 56 148 Q 65 155 72 170" stroke="url(#top-lyra)" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 144 148 Q 135 155 128 170" stroke="url(#top-lyra)" stroke-width="3" fill="none" opacity="0.7"/>

  <!-- Neck -->
  <rect x="90" y="143" width="20" height="22" rx="4" fill="#e8c8b0"/>
  <!-- Head -->
  <ellipse cx="100" cy="114" rx="34" ry="37" fill="#f0d0b8"/>
  <!-- Ears (partially hidden by hair) -->
  <ellipse cx="66" cy="116" rx="6" ry="8" fill="#e0c0a8"/>

  <!-- Long flowing hair - artistic -->
  <!-- Right side long flow -->
  <path d="M 134 110 Q 148 130 148 165 Q 145 155 138 148 Q 140 130 136 116 Z" fill="url(#hair-lyra)"/>
  <!-- Left side shorter -->
  <path d="M 66 110 Q 54 130 56 160 Q 60 150 64 142 Q 62 126 66 116 Z" fill="url(#hair-lyra)"/>
  <!-- Top hair -->
  <path d="M 66 108 Q 64 68 100 60 Q 136 68 134 108 Q 122 76 100 74 Q 78 76 66 108 Z" fill="url(#hair-lyra)"/>
  <!-- Wispy hair pieces -->
  <path d="M 100 60 Q 92 52 85 56 Q 90 60 88 66" stroke="#5a1840" stroke-width="2.5" fill="none"/>
  <path d="M 100 60 Q 108 52 115 56 Q 110 60 112 66" stroke="#5a1840" stroke-width="2.5" fill="none"/>
  <!-- Pink highlight in hair -->
  <path d="M 118 68 Q 126 80 128 96" stroke="#ff6b9d" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Eyebrows - soft, expressive -->
  <path d="M 80 102 Q 88 98 95 100" stroke="#3a0830" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 105 100 Q 112 98 120 102" stroke="#3a0830" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes - large, expressive, warm -->
  <ellipse cx="88" cy="112" rx="7" ry="7" fill="#fff"/>
  <ellipse cx="112" cy="112" rx="7" ry="7" fill="#fff"/>
  <!-- Lashes top -->
  <ellipse cx="88" cy="105.5" rx="7" ry="2.5" fill="#3a0830" opacity="0.8"/>
  <ellipse cx="112" cy="105.5" rx="7" ry="2.5" fill="#3a0830" opacity="0.8"/>
  <circle cx="88" cy="112" r="5.5" fill="#8b3060"/>
  <circle cx="112" cy="112" r="5.5" fill="#8b3060"/>
  <circle cx="88" cy="112" r="3.5" fill="#200818"/>
  <circle cx="112" cy="112" r="3.5" fill="#200818"/>
  <circle cx="89.5" cy="110.5" r="1.8" fill="rgba(255,255,255,0.9)"/>
  <circle cx="113.5" cy="110.5" r="1.8" fill="rgba(255,255,255,0.9)"/>

  <!-- Nose - elegant -->
  <path d="M 100 117 Q 97 125 95 127 Q 100 130 105 127 Q 103 125 100 117" fill="#c09070" opacity="0.6"/>

  <!-- Mouth - expressive, lipstick -->
  <path d="M 91 138 Q 100 145 109 138" stroke="#cc3060" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 94 136 Q 100 139 106 136" stroke="#e05080" stroke-width="2" fill="none" opacity="0.9"/>

  <!-- Paint brush accent - creative detail -->
  <line x1="22" y1="22" x2="42" y2="42" stroke="#ff9e7a" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <circle cx="22" cy="22" r="4" fill="#ff6b9d" opacity="0.7"/>
  <line x1="22" y1="42" x2="30" y2="42" stroke="none"/>

  <!-- Pink glow ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#ff6b9d" stroke-width="1.5" opacity="0.4"/>
</svg>
