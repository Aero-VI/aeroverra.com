<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-avery"><circle cx="100" cy="100" r="100"/></clipPath>
    <radialGradient id="bg-avery" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a1028"/>
      <stop offset="100%" stop-color="#0a0814"/>
    </radialGradient>
    <radialGradient id="glow-avery" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-avery)"/>
  <ellipse cx="100" cy="190" rx="85" ry="50" fill="url(#glow-avery)"/>
  <!-- Subtle ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>

  <!-- Outfit / shoulders — dark hoodie with orange trim -->
  <path d="M 0 200 L 0 158 Q 30 148 56 154 L 68 170 L 100 162 L 132 170 L 144 154 Q 170 148 200 158 L 200 200 Z" fill="#14101e"/>
  <!-- Hoodie hood -->
  <path d="M 56 154 Q 54 146 58 140 Q 70 132 80 140 L 74 152 Z" fill="#1c1630"/>
  <path d="M 144 154 Q 146 146 142 140 Q 130 132 120 140 L 126 152 Z" fill="#1c1630"/>
  <!-- Hoodie strings -->
  <line x1="88" y1="162" x2="86" y2="183" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="112" y1="162" x2="114" y2="183" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <!-- Hoodie centre seam -->
  <path d="M 88 162 L 91 200 L 109 200 L 112 162 Z" fill="#0f0d1a"/>

  <!-- Neck -->
  <rect x="89" y="144" width="22" height="20" rx="5" fill="#e8c8b0"/>

  <!-- Head -->
  <ellipse cx="100" cy="115" rx="34" ry="36" fill="#f0d0b4"/>
  <!-- Ears -->
  <ellipse cx="66" cy="117" rx="6" ry="8" fill="#e0bea0"/>
  <ellipse cx="134" cy="117" rx="6" ry="8" fill="#e0bea0"/>
  <ellipse cx="67" cy="117" rx="3.5" ry="5.5" fill="#eac8a8"/>
  <ellipse cx="133" cy="117" rx="3.5" ry="5.5" fill="#eac8a8"/>

  <!-- Hair - straight, shoulder-length, dark auburn with orange tips -->
  <path d="M 66 108 Q 64 68 100 62 Q 136 68 134 108 Q 126 80 100 77 Q 74 80 66 108 Z" fill="#1e0e08"/>
  <!-- Straight side curtains -->
  <path d="M 66 108 Q 62 128 64 150 Q 68 155 70 148 Q 68 132 70 118 Z" fill="#1e0e08"/>
  <path d="M 134 108 Q 138 128 136 150 Q 132 155 130 148 Q 132 132 130 118 Z" fill="#1e0e08"/>
  <!-- Orange / amber dyed tips -->
  <path d="M 64 144 Q 66 152 68 148" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 136 144 Q 134 152 132 148" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Hair top -->
  <path d="M 82 66 Q 100 59 118 66 Q 100 63 82 66 Z" fill="#2a1410"/>
  <!-- Subtle auburn sheen -->
  <path d="M 70 90 Q 72 78 78 72" stroke="#7a2008" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 122 72 Q 128 78 130 90" stroke="#7a2008" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Eyebrows - defined, slightly arched -->
  <path d="M 80 104 Q 87 100 94 103" stroke="#1e0e08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 106 103 Q 113 100 120 104" stroke="#1e0e08" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes - warm brown with amber -->
  <ellipse cx="88" cy="113" rx="6" ry="6.5" fill="#fff"/>
  <ellipse cx="112" cy="113" rx="6" ry="6.5" fill="#fff"/>
  <circle cx="88" cy="113" r="4" fill="#7a4010"/>
  <circle cx="112" cy="113" r="4" fill="#7a4010"/>
  <circle cx="89" cy="111" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="113" cy="111" r="1.5" fill="rgba(255,255,255,0.7)"/>

  <!-- Nose -->
  <path d="M 100 119 Q 97 127 95 129 Q 100 132 105 129 Q 103 127 100 119" fill="#c49070" opacity="0.75"/>

  <!-- Mouth - friendly, slightly wry -->
  <path d="M 90 138 Q 100 145 111 138" stroke="#9a4020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 93 138 Q 100 142 108 138" stroke="#e88870" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Tiny RuneLite logo hint — orange diamond on hoodie -->
  <path d="M 100 176 L 104 182 L 100 188 L 96 182 Z" fill="#f59e0b" opacity="0.85"/>
</svg>
